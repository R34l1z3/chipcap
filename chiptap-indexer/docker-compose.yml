# ============================================================
# Two modes:
#   dev:  `docker compose up -d`              -> only postgres
#         (run indexer locally with `npm run dev`)
#
#   prod: `docker compose --profile prod up -d`
#         -> postgres + one-shot migrator + indexer container
#
# The `prod` services are gated behind a profile so the dev
# workflow (host-side `npm run dev`) remains unchanged.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: chiptap-indexer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chiptap
      POSTGRES_PASSWORD: chiptap_secret
      POSTGRES_DB: chiptap_pvp_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chiptap -d chiptap_pvp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot DB migrator. Runs to completion, then the long-lived
  # `indexer` service starts. Idempotent (CREATE TABLE IF NOT EXISTS).
  indexer-migrate:
    profiles: ["prod"]
    image: chiptap-indexer:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "src/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chiptap:chiptap_secret@postgres:5432/chiptap_pvp_db
    restart: "no"

  # Long-running event listener + REST + WS server.
  indexer:
    profiles: ["prod"]
    image: chiptap-indexer:latest
    container_name: chiptap-indexer
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      indexer-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://chiptap:chiptap_secret@postgres:5432/chiptap_pvp_db
      PORT: "3002"
      WS_PORT: "3003"
      # NOTE: these names are *_PROD on purpose so they don't collide with
      # the dev `.env` (which uses RPC_WS=ws://127.0.0.1:8545 for host-side
      # `npm run dev`). Override per-deployment via shell or a compose env file.
      RPC_WS:           ${RPC_WS_PROD:-ws://host.docker.internal:8545}
      RPC_HTTP:         ${RPC_HTTP_PROD:-http://host.docker.internal:8545}
      CHIP_NFT_ADDRESS: ${CHIP_NFT_ADDRESS:?CHIP_NFT_ADDRESS is required for prod profile}
      BATTLE_ARENA_ADDRESS: ${BATTLE_ARENA_ADDRESS:?BATTLE_ARENA_ADDRESS is required for prod profile}
      START_BLOCK:      ${START_BLOCK_PROD:-0}
      CONFIRMATIONS:    ${CONFIRMATIONS_PROD:-0}
    ports:
      - "3002:3002"
      - "3003:3003"
    # Lets the container reach a host-running RPC node (e.g. Hardhat
    # node on Windows/Mac/Linux). Harmless if RPC_* point elsewhere.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # nginx serving the React SPA, reverse-proxies /api -> indexer:3002 and
  # /ws -> indexer:3003. Same image works behind plain HTTP or a TLS
  # terminator (the frontend resolves /ws to ws[s]://current-host/ws).
  frontend:
    profiles: ["prod"]
    image: chiptap-frontend:latest
    container_name: chiptap-frontend
    build:
      # Frontend lives outside the indexer dir. Compose resolves
      # context relative to this docker-compose.yml.
      context: ../chiptap-pvp-frontend
      dockerfile: Dockerfile
      args:
        VITE_INDEXER_URL: ${VITE_INDEXER_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-chiptap-pvp}
    depends_on:
      indexer:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
