# ============================================================
# ChipTap PvP — nginx config (replaces default.conf)
#
# Serves the SPA bundle and reverse-proxies /api/* to the indexer's
# REST API and /ws to its WebSocket server. The bundle is built with
# relative URLs (`/api`, `/ws`) so the same image works on http://
# and https:// without rebuilds.
#
# Upstream resolution is deferred to request-time via Docker's
# embedded DNS (127.0.0.11) so nginx
#   • starts even if the indexer is not up yet,
#   • picks up new container IPs after restarts,
#   • returns 502 (rather than refusing to boot) when upstream is
#     unreachable.
# ============================================================

# Docker's embedded DNS for user-defined networks.
# `valid=` makes nginx refresh the cached A-record periodically.
# `ipv6=off` avoids slow AAAA lookups in pure-IPv4 setups.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen      8080 default_server;
    server_name _;

    server_tokens off;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header  X-Forwarded-For;

    root /usr/share/nginx/html;
    index index.html;

    # ----- compression -----
    gzip on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # ----- health endpoint (Docker / k8s liveness) -----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ----- hashed assets: long cache -----
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- indexer REST API -----
    # `set` + variable in proxy_pass forces runtime DNS resolution.
    location /api/ {
        set                $api_upstream  http://indexer:3002;
        proxy_pass         $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ----- indexer WebSocket -----
    location /ws {
        set                $ws_upstream   http://indexer:3003;
        proxy_pass         $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # ----- SPA fallback -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html (so deploys are picked up immediately).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Hide dotfiles if anything sneaks into the bundle.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
