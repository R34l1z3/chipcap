# Same SPA-shell + lazy-DNS proxy pattern as the EVM frontend.
# `indexer` is resolved at request time so nginx starts even when
# the indexer isn't up yet (avoids the EVM-stack startup deadlock
# we hit before).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen      8080 default_server;
    server_name _;

    server_tokens off;
    set_real_ip_from 0.0.0.0/0;
    real_ip_header  X-Forwarded-For;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml application/xml+rss
        image/svg+xml font/ttf font/woff font/woff2;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        set                $api_upstream  http://indexer:3002;
        proxy_pass         $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /ws {
        set                $ws_upstream  http://indexer:3003;
        proxy_pass         $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    location / { try_files $uri $uri/ /index.html; }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) { deny all; }
}
